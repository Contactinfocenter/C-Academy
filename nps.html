<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SQI Dashboard</title>
  <style>
    body { 
      font-family: Segoe UI, Arial, sans-serif; 
      background: #f6f9fc; 
      padding: 40px; 
      margin: 0;
    }
    h1 { 
      text-align: center; 
      margin-bottom: 30px; 
      color: #333; 
    }

    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* Responsive layout */
    @media (max-width: 768px) {
      .dashboard {
        grid-template-columns: 1fr;
      }
    }

    table { 
      width: 100%;
      border-collapse: collapse; 
      background: #fff; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-radius: 6px;
      overflow: hidden;
    }
    th, td { 
      padding: 12px 18px; 
      border: 1px solid #e0e6ef; 
      text-align: right; 
    }
    th { 
      background: #e9f0ff; 
      font-weight: 600; 
      text-align: center;
    }
    td.label { text-align: left; }
    tr.highlight td { background: #d8ebff; font-weight: 700; }
    td { transition: background 0.3s ease; }

    /* Chart container */
    #chart-container {
      background: #fff;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #chart-title {
      font-weight: 600;
      font-size: 18px;
      color: #333;
      margin-bottom: 15px;
      text-align: center;
    }

    canvas {
      width: 100% !important;
      height: auto !important;
    }
  </style>
</head>
<body>
  <h1>SQI Dashboard</h1>
  <div class="dashboard">
    <!-- Left column: Table -->
    <table>
      <tr>
        <th></th>
        <th>Overall</th>
        <th>Urban</th>
        <th>Rural</th>
      </tr>
      <tr>
        <td class="label">Promoter</td>
        <td id="all1"></td>
        <td id="urban1"></td>
        <td id="rural1"></td>
      </tr>
      <tr>
        <td class="label">Detractor</td>
        <td id="all2"></td>
        <td id="urban2"></td>
        <td id="rural2"></td>
      </tr>
      <tr class="highlight">
        <td class="label">SQI</td>
        <td id="allsqi"></td>
        <td id="urbansqi"></td>
        <td id="ruralsqi"></td>
      </tr>
    </table>

    <!-- Right column: Chart -->
    <div id="chart-container">
      <div id="chart-title">SQI Comparison</div>
      <canvas id="chart"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzLcEzJfI8vvL7Me2e7ymbiuWD18bKN0X-YRDwzNgu00vnnSWLguYlWzQI3kvQ_JSmZfA/exec"; 

    fetch(API_URL)
      .then(res => res.json())
      .then(d => {
        const set = (id,val)=>document.getElementById(id).textContent=val;
        set("all1",  d.All.pct1  + "%");
        set("all2",  d.All.pct2  + "%");
        set("allsqi",d.All.sqi);

        set("urban1",  d.Urban.pct1  + "%");
        set("urban2",  d.Urban.pct2  + "%");
        set("urbansqi",d.Urban.sqi);

        set("rural1",  d.Rural.pct1  + "%");
        set("rural2",  d.Rural.pct2  + "%");
        set("ruralsqi",d.Rural.sqi);

        // Draw chart
        const ctx = document.getElementById('chart');
        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: ['Overall','Urban','Rural'],
            datasets: [{
              label: 'SQI',
              data: [d.All.sqi, d.Urban.sqi, d.Rural.sqi],
              backgroundColor: ['#007bff', '#17a2b8', '#28a745'],
              borderWidth: 1
            }]
          },
          options: { 
            scales: { 
              y: { beginAtZero:true, max:5 } 
            },
            plugins: {
              legend: { display: false }
            }
          }
        });
      })
      .catch(e=>{
        console.error(e);
        alert("Failed to load data from Google Sheet");
      });
  </script>
</body>
</html>
