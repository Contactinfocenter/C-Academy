<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SQI + NPS Dashboard</title>
  <style>
    body { 
      font-family: Segoe UI, Arial, sans-serif; 
      background: #f6f9fc; 
      padding: 40px; 
      margin: 0;
    }
    h1, h2 { 
      text-align: center; 
      color: #333; 
      margin-bottom: 30px;
    }
    h2 { margin-top: 70px; }

    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      max-width: 1000px;
      margin: 0 auto 60px auto;
    }

    @media (max-width: 768px) {
      .dashboard { grid-template-columns: 1fr; }
    }

    table { 
      width: 100%;
      border-collapse: collapse; 
      background: #fff; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-radius: 6px;
      overflow: hidden;
    }
    th, td { 
      padding: 12px 18px; 
      border: 1px solid #e0e6ef; 
      text-align: right; 
    }
    th { 
      background: #e9f0ff; 
      font-weight: 600; 
      text-align: center;
    }
    td.label { text-align: left; }
    tr.highlight td { background: #d8ebff; font-weight: 700; }
    td { transition: background 0.3s ease; }

    #chart-container, #nps-chart-container {
      background: #fff;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #chart-title, #nps-chart-title {
      font-weight: 600;
      font-size: 18px;
      color: #333;
      margin-bottom: 15px;
      text-align: center;
    }

    canvas {
      width: 100% !important;
      height: auto !important;
    }
  </style>
</head>
<body>
  <h1>SQI Dashboard</h1>

  <!-- SQI Section -->
  <div class="dashboard">
    <table>
      <tr>
        <th></th>
        <th>Overall</th>
        <th>Urban</th>
        <th>Rural</th>
      </tr>
      <tr>
        <td class="label">Promoter</td>
        <td id="all1"></td>
        <td id="urban1"></td>
        <td id="rural1"></td>
      </tr>
      <tr>
        <td class="label">Detractor</td>
        <td id="all2"></td>
        <td id="urban2"></td>
        <td id="rural2"></td>
      </tr>
      <tr class="highlight">
        <td class="label">SQI</td>
        <td id="allsqi"></td>
        <td id="urbansqi"></td>
        <td id="ruralsqi"></td>
      </tr>
    </table>

    <div id="chart-container">
      <div id="chart-title">SQI Comparison</div>
      <canvas id="chart"></canvas>
    </div>
  </div>

  <!-- NPS Section -->
  <h2>NPS Dashboard</h2>
  <div class="dashboard">
    <table>
      <tr>
        <th></th>
        <th>Overall</th>
        <th>Urban</th>
        <th>Rural</th>
      </tr>
      <tr>
        <td class="label">Promoter (1)</td>
        <td id="npsAll1"></td>
        <td id="npsUrban1"></td>
        <td id="npsRural1"></td>
      </tr>
      <tr>
        <td class="label">Detractor (2)</td>
        <td id="npsAll2"></td>
        <td id="npsUrban2"></td>
        <td id="npsRural2"></td>
      </tr>
      <tr>
        <td class="label">Passive (3)</td>
        <td id="npsAll3"></td>
        <td id="npsUrban3"></td>
        <td id="npsRural3"></td>
      </tr>
      <tr class="highlight">
        <td class="label">NPS</td>
        <td id="npsAllScore"></td>
        <td id="npsUrbanScore"></td>
        <td id="npsRuralScore"></td>
      </tr>
    </table>

    <div id="nps-chart-container">
      <div id="nps-chart-title">NPS Comparison</div>
      <canvas id="npsChart"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwHhFLN8Andap74W62o_MoRMzfN890LAqgJxSEEcHzGhJikZTiuoTTg5v8_ZqNV_r8Usw/exec"; 

    fetch(API_URL)
      .then(res => res.json())
      .then(res => {
        const d = res;
        const sqi = d.SQI;
        const nps = d.NPS;

        // SQI values
        const set = (id,val)=>document.getElementById(id).textContent=val;
        set("all1",  sqi.All.pct1 + "%");
        set("all2",  sqi.All.pct2 + "%");
        set("allsqi", sqi.All.sqi);
        set("urban1", sqi.Urban.pct1 + "%");
        set("urban2", sqi.Urban.pct2 + "%");
        set("urbansqi", sqi.Urban.sqi);
        set("rural1", sqi.Rural.pct1 + "%");
        set("rural2", sqi.Rural.pct2 + "%");
        set("ruralsqi", sqi.Rural.sqi);

        // Draw SQI chart
        new Chart(document.getElementById('chart'), {
          type: 'bar',
          data: {
            labels: ['Overall','Urban','Rural'],
            datasets: [{
              label: 'SQI',
              data: [sqi.All.sqi, sqi.Urban.sqi, sqi.Rural.sqi],
              backgroundColor: ['#007bff', '#17a2b8', '#28a745'],
              borderWidth: 1
            }]
          },
          options: { scales: { y: { beginAtZero:true, max:5 }}, plugins:{ legend:{display:false} } }
        });

        // NPS values
        set("npsAll1", nps.All.p1 + "%");
        set("npsAll2", nps.All.p2 + "%");
        set("npsAll3", nps.All.p3 + "%");
        set("npsAllScore", nps.All.nps);

        set("npsUrban1", nps.Urban.p1 + "%");
        set("npsUrban2", nps.Urban.p2 + "%");
        set("npsUrban3", nps.Urban.p3 + "%");
        set("npsUrbanScore", nps.Urban.nps);

        set("npsRural1", nps.Rural.p1 + "%");
        set("npsRural2", nps.Rural.p2 + "%");
        set("npsRural3", nps.Rural.p3 + "%");
        set("npsRuralScore", nps.Rural.nps);

        // Draw NPS chart
        new Chart(document.getElementById('npsChart'), {
          type: 'bar',
          data: {
            labels: ['Overall','Urban','Rural'],
            datasets: [{
              label: 'NPS',
              data: [nps.All.nps, nps.Urban.nps, nps.Rural.nps],
              backgroundColor: ['#ff6384', '#ff9f40', '#4bc0c0'],
              borderWidth: 1
            }]
          },
          options: { scales: { y: { beginAtZero:true, max:100 }}, plugins:{ legend:{display:false} } }
        });
      })
      .catch(e=>{
        console.error(e);
        alert("Failed to load data from Google Sheet");
      });
  </script>
</body>
</html>
